<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ item.brand }} - {{ item.title }}</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #111; color: #fff; padding: 40px; max-width: 800px; margin: 0 auto; }
        .back { margin-bottom: 30px; display: inline-block; color: #888; }
        .brand { font-size: 1.2em; text-transform: uppercase; color: #aaa; }
        h1 { font-size: 2.5em; margin: 10px 0; }
        .meta { font-size: 1.1em; color: #888; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .price { font-size: 2em; color: #00ff66; font-weight: bold; margin-bottom: 20px; }
        .desc { line-height: 1.6; font-size: 1.1em; background: #1a1a1a; padding: 20px; border-left: 3px solid #fff; }
        .buy-btn { display: inline-block; background: #00ff66; color: #000; padding: 15px 30px; font-size: 1.2em; font-weight: bold; margin-top: 30px; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <a href="/" class="back">&larr; Вернуться в каталог</a>

    <div class="brand">{{ item.brand }}</div>
    <h1>{{ item.title }}</h1>

    <div class="meta">
        <strong>Сезон:</strong> {{ item.season }} <br>
        <strong>Размер:</strong> {{ item.size }} <br>
        <strong>Состояние:</strong> {{ item.condition }}
    </div>

    <div class="price">${{ "{:,.2f}".format(item.price) }}</div>

    <div class="desc">
        <h3>Описание лота:</h3>
        <p>{{ item.description }}</p>
    </div>

    <button class="buy-btn" onclick="alert('Для покупки этой архивной позиции свяжитесь с менеджером в Telegram')">BUY GRAIL</button>

</body>
</html>
